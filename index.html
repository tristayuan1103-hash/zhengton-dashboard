<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政瞳热度监控看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e8e8f0;min-height:100vh;padding:24px;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 20% 50%,rgba(233,30,140,.1) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(255,120,180,.08) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(180,80,255,.06) 0%,transparent 50%);pointer-events:none;z-index:0}

.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.4;animation:float 20s ease-in-out infinite;pointer-events:none;z-index:0}
.orb-1{width:400px;height:400px;background:rgba(255,100,180,.15);top:-100px;right:-100px;animation-delay:0s}
.orb-2{width:300px;height:300px;background:rgba(180,80,255,.12);bottom:-50px;left:-80px;animation-delay:-7s}
.orb-3{width:250px;height:250px;background:rgba(255,180,200,.1);top:40%;left:60%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.05)}66%{transform:translate(-20px,30px) scale(.95)}}

.dashboard{max-width:1440px;margin:0 auto;position:relative;z-index:1}
.glass{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05)}

/* Header */
.header{text-align:center;padding:40px 24px;margin-bottom:28px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(233,30,140,.05),transparent,rgba(180,80,255,.05),transparent);animation:rotate 30s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}
.header h1{font-size:2.4em;font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,#ff6b9d 0%,#c44569 30%,#ff6b9d 60%,#ffb3cc 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s ease-in-out infinite;position:relative}
@keyframes shimmer{0%,100%{background-position:0% center}50%{background-position:200% center}}
.header .subtitle{color:rgba(255,255,255,.5);font-size:.9em;margin-top:8px;font-weight:300;letter-spacing:.5px}
.header .update-time{margin-top:10px;color:rgba(255,255,255,.35);font-size:.82em}
.header .clock{color:#ff6b9d;font-family:'SF Mono','Menlo',monospace;font-size:.85em;margin-top:6px}

/* Stats Row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px}
.stat-card{padding:20px 14px;text-align:center;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(233,30,140,.05),transparent);opacity:0;transition:opacity .3s}
.stat-card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 12px 40px rgba(233,30,140,.1);border-color:rgba(233,30,140,.2)}
.stat-card:hover::before{opacity:1}
.stat-card .number{font-size:1.6em;font-weight:800;background:linear-gradient(135deg,#ff6b9d,#c44569);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative}
.stat-card .label{font-size:.75em;color:rgba(255,255,255,.45);margin-top:6px;font-weight:400;text-transform:uppercase;letter-spacing:1px}
.stat-card .sub{font-size:.65em;color:rgba(255,255,255,.25);margin-top:3px}

/* Sections */
.section{padding:28px;margin-bottom:28px}
.section h2{font-size:1.25em;margin-bottom:18px;color:#fff;display:flex;align-items:center;gap:10px;font-weight:700}
.section h2::before{content:'';width:4px;height:22px;background:linear-gradient(180deg,#ff6b9d,#c44569);border-radius:4px;box-shadow:0 0 12px rgba(233,30,140,.4)}

/* Controls & Buttons */
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:24px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);cursor:pointer;font-size:.82em;font-weight:500;transition:all .3s;backdrop-filter:blur(4px)}
.btn:hover{background:rgba(233,30,140,.1);border-color:rgba(233,30,140,.3);color:#ff6b9d;box-shadow:0 0 16px rgba(233,30,140,.1)}
.btn.active{background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;border-color:transparent;font-weight:600;box-shadow:0 4px 16px rgba(233,30,140,.3)}

/* Section Toggle */
.section-toggle{float:right;padding:4px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer;font-size:.75em;transition:all .2s}
.section-toggle:hover{border-color:rgba(233,30,140,.3);color:#ff6b9d}

/* Table */
table{width:100%;border-collapse:collapse}
th,td{padding:11px 8px;text-align:left;border-bottom:1px solid rgba(255,255,255,.04)}
th{color:rgba(255,255,255,.4);font-size:.75em;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
tr{transition:all .2s}
tr:hover{background:rgba(233,30,140,.03)}

/* Rank Badges */
.rank{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.78em}
.rank-1{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e;box-shadow:0 2px 8px rgba(255,200,0,.4)}
.rank-2{background:linear-gradient(135deg,#e0e0e0,#a0a0a0);color:#1a1a2e;box-shadow:0 2px 8px rgba(200,200,200,.3)}
.rank-3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff;box-shadow:0 2px 8px rgba(205,127,50,.3)}
.rank-other{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}

/* Content Elements */
.author{color:#ff9dc4;font-weight:600}
.content-preview{max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,.6)}
.metric{font-weight:600}
.metric-likes{color:#ff6b8a}
.metric-comments{color:#4ecdc4}
.metric-reposts{color:#a78bfa}
.time-col{color:rgba(255,255,255,.35);font-size:.78em;white-space:nowrap}

/* Search */
.search-box input{width:100%;padding:11px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#e8e8f0;font-size:.88em;outline:none;margin-bottom:16px;transition:all .3s;backdrop-filter:blur(4px)}
.search-box input:focus{border-color:rgba(233,30,140,.4);box-shadow:0 0 20px rgba(233,30,140,.08)}
.search-box input::placeholder{color:rgba(255,255,255,.3)}

/* Post Cards */
.post-card{background:rgba(255,255,255,.02);border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid rgba(255,255,255,.05);transition:all .3s}
.post-card:hover{border-color:rgba(233,30,140,.15);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.post-card .pc-header{display:flex;justify-content:space-between;margin-bottom:10px;align-items:center;flex-wrap:wrap;gap:6px}
.post-card .pc-content{color:rgba(255,255,255,.6);font-size:.88em;margin-bottom:12px;line-height:1.6}
.post-card .pc-metrics{display:flex;gap:16px;font-size:.82em;flex-wrap:wrap}

/* Comments */
.comments-section{margin-top:12px;border-top:1px solid rgba(255,255,255,.05);padding-top:10px}
.comments-section.collapsed{display:none}
.comments-toggle{background:none;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:4px 12px;font-size:.75em;color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;margin-top:8px}
.comments-toggle:hover{border-color:rgba(233,30,140,.3);color:#ff6b9d}
.comment-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.comment-item:last-child{border-bottom:none}
.comment-item .ci-user{color:#ff9dc4;font-size:.8em;font-weight:600}
.comment-item .ci-text{color:rgba(255,255,255,.5);font-size:.82em;margin-top:3px;line-height:1.5}
.comment-item .ci-likes{color:rgba(255,255,255,.25);font-size:.72em;margin-top:2px}

/* Charts */
.chart-container{position:relative;height:260px;margin-top:16px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:rgba(255,255,255,.02);border-radius:14px;padding:20px;border:1px solid rgba(255,255,255,.05)}
.chart-card h3{font-size:.9em;color:rgba(255,255,255,.6);margin-bottom:12px;font-weight:600}

/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.72em;margin:2px;background:rgba(233,30,140,.08);color:#ff6b9d;border:1px solid rgba(233,30,140,.15);font-weight:500}
.tag-blue{background:rgba(100,180,255,.08);color:#64b4ff;border-color:rgba(100,180,255,.2)}
.tag-green{background:rgba(78,205,196,.08);color:#4ecdc4;border-color:rgba(78,205,196,.15)}

/* Two Column Layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}table{font-size:.78em}th,td{padding:7px 5px}.header h1{font-size:1.8em}}

/* Personal Stats */
.personal-stat{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);transition:all .2s}
.personal-stat:hover{padding-left:6px;border-bottom-color:rgba(233,30,140,.1)}
.personal-stat .ps-label{color:rgba(255,255,255,.45);font-size:.88em}
.personal-stat .ps-value{color:#ff6b9d;font-weight:700}

/* Scroll Animations */
.fade-in{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* Footer */
.footer{text-align:center;padding:28px;color:rgba(255,255,255,.25);font-size:.8em;letter-spacing:.5px}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="dashboard">

<!-- Header -->
<div class="header glass fade-in">
<h1>政瞳热度监控看板</h1>
<p class="subtitle">孙政 × 吕思瞳 × 政瞳超话</p>
<div class="update-time" id="update-time">数据加载中...</div>
<div class="clock" id="live-clock"></div>
</div>

<!-- Stats Row -->
<div class="stats-row fade-in" id="stats-row"></div>

<!-- 孙政 -->
<div class="section glass fade-in">
<h2>孙政微博 <button class="section-toggle" onclick="toggleSection('sz')">收起</button></h2>
<div id="body-sz">
<div class="two-col">
<div id="sz-stats"></div>
<div><div class="chart-container" style="height:200px"><canvas id="chart-sz-fans"></canvas></div></div>
</div>
<h3 style="color:#64b4ff;margin:16px 0 10px;font-size:.95em;">热门帖子 TOP10</h3>
<div class="search-box"><input type="text" placeholder="搜索帖子内容..." oninput="filterPosts('sz',this.value)"></div>
<div class="controls"><button class="btn active" onclick="sortPosts('sz','likes')">按点赞</button><button class="btn" onclick="sortPosts('sz','comments')">按评论</button><button class="btn" onclick="sortPosts('sz','reposts')">按转发</button></div>
<div id="sz-posts"></div>
</div>
</div>

<!-- 吕思瞳 -->
<div class="section glass fade-in">
<h2>吕思瞳微博 <button class="section-toggle" onclick="toggleSection('lt')">收起</button></h2>
<div id="body-lt">
<div class="two-col">
<div id="lt-stats"></div>
<div><div class="chart-container" style="height:200px"><canvas id="chart-lt-fans"></canvas></div></div>
</div>
<h3 style="color:#4ecdc4;margin:16px 0 10px;font-size:.95em;">热门帖子 TOP10</h3>
<div class="search-box"><input type="text" placeholder="搜索帖子内容..." oninput="filterPosts('lt',this.value)"></div>
<div class="controls"><button class="btn active" onclick="sortPosts('lt','likes')">按点赞</button><button class="btn" onclick="sortPosts('lt','comments')">按评论</button><button class="btn" onclick="sortPosts('lt','reposts')">按转发</button></div>
<div id="lt-posts"></div>
</div>
</div>

<!-- 超话 -->
<div class="section glass fade-in">
<h2>政瞳超话 · 热帖 <button class="section-toggle" onclick="toggleSection('chahua')">收起</button></h2>
<div id="body-chahua">
<div class="search-box"><input type="text" placeholder="搜索帖子内容或作者..." oninput="filterPosts('chahua',this.value)"></div>
<div class="controls"><button class="btn active" onclick="sortPosts('chahua','likes')">按点赞</button><button class="btn" onclick="sortPosts('chahua','comments')">按评论</button><button class="btn" onclick="sortPosts('chahua','reposts')">按转发</button></div>
<div id="chahua-posts"></div>
</div>
</div>

<!-- 趋势图表 -->
<div class="section glass fade-in">
<h2>历史趋势</h2>
<div class="charts-grid">
<div class="chart-card"><h3>超话粉丝数</h3><canvas id="chart-chahua-fans"></canvas></div>
<div class="chart-card"><h3>粉丝数对比</h3><canvas id="chart-fans-compare"></canvas></div>
<div class="chart-card"><h3>互动量对比</h3><canvas id="chart-interact"></canvas></div>
<div class="chart-card"><h3>最热帖互动对比</h3><canvas id="chart-top"></canvas></div>
</div>
</div>

<div class="footer">政瞳热度监控看板 · 数据每3小时自动更新 · Powered by 微博API</div>
</div>

<script>
// === Utilities ===
function parseNum(val){
  if(typeof val==='number')return val;
  if(typeof val==='string'){const m=val.match(/([\d.]+)\s*([万亿]?)/);if(m){let n=parseFloat(m[1]);if(m[2]==='万')n*=10000;if(m[2]==='亿')n*=100000000;return n;}}
  return 0;
}
function fmt(n){
  n=parseNum(n);
  if(!n)return'--';
  if(n>=100000000)return(n/100000000).toFixed(1)+'亿';
  if(n>=10000)return(n/10000).toFixed(1)+'万';
  return n.toLocaleString();
}
function rc(i){return i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';}

// === Clock ===
function updateClock(){
  const now=new Date();
  document.getElementById('live-clock').textContent='🕐 '+now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
updateClock();setInterval(updateClock,1000);

// === Section Toggle ===
function toggleSection(id){
  const body=document.getElementById('body-'+id);
  const btn=body.parentElement.querySelector('.section-toggle');
  if(body.style.display==='none'){body.style.display='';btn.textContent='收起';}
  else{body.style.display='none';btn.textContent='展开';}
}

// === Post Sorting & Filtering ===
const postData={sz:[],lt:[],chahua:[]};
const sortState={sz:{key:'likes',dir:'desc'},lt:{key:'likes',dir:'desc'},chahua:{key:'likes',dir:'desc'}};
const filterState={sz:'',lt:'',chahua:''};

function sortPosts(section,key){
  const s=sortState[section];
  if(s.key===key)s.dir=s.dir==='desc'?'asc':'desc';
  else{s.key=key;s.dir='desc';}
  const container=document.getElementById(section===('chahua')?'body-chahua':'body-'+section);
  container.querySelectorAll('.controls .btn').forEach(b=>b.classList.remove('active'));
  const idx={likes:0,comments:1,reposts:2}[key];
  container.querySelectorAll('.controls .btn')[idx].classList.add('active');
  renderPosts(section);
}

function filterPosts(section,q){
  filterState[section]=q.toLowerCase();
  renderPosts(section);
}

function renderPosts(section){
  const s=sortState[section];
  const q=filterState[section];
  let posts=[...postData[section]];
  if(q)posts=posts.filter(p=>(p.text||'').toLowerCase().includes(q)||(p.user_name||'').toLowerCase().includes(q));
  posts.sort((a,b)=>{
    const va=a[s.key]||0,vb=b[s.key]||0;
    return s.dir==='desc'?vb-va:va-vb;
  });
  const showAuthor=section==='chahua';
  const el=document.getElementById(section+'-posts');
  if(!posts.length){el.innerHTML='<div style="color:rgba(255,255,255,.3);padding:20px;text-align:center">暂无数据</div>';return;}
  el.innerHTML=posts.map((p,i)=>{
    const uid=section+'-'+i;
    const authorHtml=showAuthor&&p.user_name?`<span class="author">${p.user_name}</span>${p.verified?'<span class="tag">✦ 认证</span>':''}`:''
    const commentsHtml=(p.top_comments||[]).map(c=>`
      <div class="comment-item"><span class="ci-user">${c.user_name||''}${c.verified?' ✦':''}</span><div class="ci-text">${c.text||''}</div><div class="ci-likes">👍 ${fmt(c.likes)}</div></div>`).join('');
    return`
    <div class="post-card">
      <div class="pc-header">${authorHtml}<span class="time-col">${p.created_at||''}</span></div>
      <div class="pc-content"><span class="rank ${rc(i)}">${i+1}</span> ${p.text||'（无文字内容）'}</div>
      <div class="pc-metrics">
        <span class="metric metric-reposts">🔁 ${fmt(p.reposts)}</span>
        <span class="metric metric-comments">💬 ${fmt(p.comments)}</span>
        <span class="metric metric-likes">❤️ ${fmt(p.likes)}</span>
        <span style="color:#ff6b9d;font-weight:700">总互动 ${fmt(p.interact)}</span>
      </div>
      ${commentsHtml?`<button class="comments-toggle" onclick="toggleComments('${uid}')">💬 展开评论 (${(p.top_comments||[]).length})</button><div class="comments-section collapsed" id="comments-${uid}">${commentsHtml}</div>`:''}
    </div>`;
  }).join('');
}

function toggleComments(uid){
  const el=document.getElementById('comments-'+uid);
  const btn=el.previousElementSibling;
  if(el.classList.contains('collapsed')){el.classList.remove('collapsed');btn.textContent='💬 收起评论';}
  else{el.classList.add('collapsed');btn.textContent='💬 展开评论 ('+el.children.length+')';}
}

// === Chart Helper ===
function makeChart(id,labels,datasets,type='line',opts={}){
  const ctx=document.getElementById(id);if(!ctx)return;
  new Chart(ctx,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'#aaa',font:{size:11},boxWidth:10}}},scales:{x:{ticks:{color:'#666',font:{size:10},maxTicksLimit:10},grid:{color:'rgba(255,255,255,.03)'}},y:{ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,.03)'}}},...opts}});
}

// === Render Stats ===
function renderPersonalStats(containerId,data){
  const el=document.getElementById(containerId);
  el.innerHTML=data.map(d=>`<div class="personal-stat"><span class="ps-label">${d[0]}</span><span class="ps-value">${d[1]}</span></div>`).join('');
}

// === Load Data ===
function loadData(history){
  if(!history||!history.length){document.getElementById('update-time').textContent='暂无数据';return;}
  const latest=history[history.length-1];
  document.getElementById('update-time').textContent='上次更新：'+(latest.timestamp||latest.date);

  // Stats row
  document.getElementById('stats-row').innerHTML=[
    ['超话帖子',fmt(latest.chahua_posts)],
    ['超话粉丝',fmt(latest.chahua_fans)],
    ['孙政粉丝',fmt(latest.sunzheng_fans)],
    ['吕思瞳粉丝',fmt(latest.lvtong_fans)],
    ['孙政互动',fmt(latest.sunzheng_interact),'近10帖总量'],
    ['吕思瞳互动',fmt(latest.lvtong_interact),'近10帖总量'],
    ['孙政最热帖',fmt(latest.sunzheng_top_post)],
    ['吕思瞳最热帖',fmt(latest.lvtong_top_post)],
  ].map(d=>`<div class="stat-card glass"><div class="number">${d[1]}</div><div class="label">${d[0]}</div>${d[2]?`<div class="sub">${d[2]}</div>`:''}</div>`).join('');

  // Personal stats
  renderPersonalStats('sz-stats',[['粉丝数',fmt(latest.sunzheng_fans)],['微博总数',fmt(latest.sunzheng_weibo_count)],['近期互动总量',fmt(latest.sunzheng_interact)],['最热单帖互动',fmt(latest.sunzheng_top_post)]]);
  renderPersonalStats('lt-stats',[['粉丝数',fmt(latest.lvtong_fans)],['微博总数',fmt(latest.lvtong_weibo_count)],['近期互动总量',fmt(latest.lvtong_interact)],['最热单帖互动',fmt(latest.lvtong_top_post)]]);

  // Posts
  postData.sz=latest.sunzheng_top10||[];
  postData.lt=latest.lvtong_top10||[];
  postData.chahua=latest.chahua_top10||[];
  renderPosts('sz');renderPosts('lt');renderPosts('chahua');

  // Charts
  const labels=history.map(h=>(h.date||'').slice(5));

  makeChart('chart-sz-fans',labels,[{label:'孙政粉丝',data:history.map(h=>parseNum(h.sunzheng_fans)),borderColor:'#64b4ff',backgroundColor:'rgba(100,180,255,.1)',fill:true,tension:.4,pointRadius:3}]);
